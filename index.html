
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: transparent; }

  #universe {
    width: 100%;
    height: 580px;
    background: radial-gradient(ellipse at 30% 40%, #0a0f1e 0%, #020408 100%);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Space Mono', monospace;
  }

  #universe::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(1px 1px at 15% 20%, rgba(100,200,255,0.4) 0%, transparent 0%),
      radial-gradient(1px 1px at 60% 10%, rgba(150,180,255,0.3) 0%, transparent 0%),
      radial-gradient(1px 1px at 80% 60%, rgba(100,255,200,0.25) 0%, transparent 0%),
      radial-gradient(1px 1px at 25% 75%, rgba(200,150,255,0.3) 0%, transparent 0%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,200,100,0.2) 0%, transparent 0%),
      radial-gradient(1.5px 1.5px at 50% 50%, rgba(150,255,200,0.35) 0%, transparent 0%),
      radial-gradient(1px 1px at 5% 55%, rgba(100,150,255,0.3) 0%, transparent 0%),
      radial-gradient(1.5px 1.5px at 70% 85%, rgba(255,150,200,0.25) 0%, transparent 0%);
    pointer-events: none;
    animation: starPulse 8s ease-in-out infinite alternate;
  }

  @keyframes starPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  canvas#network {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .bookmark-node {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
    transition: transform 0.3s ease;
  }

  .node-core {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .node-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid;
    animation: ringPulse 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.4); opacity: 0; }
  }

  .node-label {
    position: absolute;
    bottom: -26px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    text-shadow: 0 0 8px currentColor;
  }

  .bookmark-node:hover .node-label { opacity: 1; }

  .node-count {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .bookmark-node:hover .node-count,
  .node-count.visible { opacity: 1; }

  .node-icon {
    font-size: 14px;
    transition: transform 0.3s ease;
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  .bookmark-node:hover .node-core {
    transform: scale(1.3);
  }

  .bookmark-node:hover .node-icon {
    transform: scale(1.2);
    filter: brightness(1.5);
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: rippleOut 0.8s ease-out forwards;
    transform: translate(-50%, -50%);
    z-index: 5;
  }

  @keyframes rippleOut {
    0% { width: 10px; height: 10px; opacity: 0.8; }
    100% { width: 120px; height: 120px; opacity: 0; }
  }

  #hud {
    position: absolute;
    top: 14px;
    left: 18px;
    font-family: 'Syne', sans-serif;
    pointer-events: none;
    z-index: 20;
  }

  #hud-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(100,220,200,0.7);
    text-shadow: 0 0 12px rgba(100,220,200,0.5);
  }

  #hud-status {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(150,200,255,0.5);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  #instructions {
    position: absolute;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(150,200,255,0.35);
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 20;
  }

  #add-panel {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 30;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  #url-input {
    background: rgba(10,20,40,0.8);
    border: 0.5px solid rgba(100,180,255,0.3);
    border-radius: 6px;
    color: rgba(150,220,255,0.9);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 5px 8px;
    outline: none;
    width: 140px;
    letter-spacing: 0.04em;
  }

  #url-input::placeholder { color: rgba(100,150,200,0.4); }
  #url-input:focus { border-color: rgba(100,200,255,0.6); box-shadow: 0 0 12px rgba(100,200,255,0.15); }

  #add-btn {
    background: rgba(40,120,100,0.3);
    border: 0.5px solid rgba(80,220,180,0.4);
    border-radius: 6px;
    color: rgba(100,240,200,0.9);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }

  #add-btn:hover { background: rgba(60,180,140,0.4); box-shadow: 0 0 16px rgba(80,220,180,0.3); }

  .tooltip {
    position: fixed;
    background: rgba(5,15,30,0.95);
    border: 0.5px solid rgba(100,200,255,0.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(200,230,255,0.9);
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 200px;
    line-height: 1.6;
  }

  .tooltip.show { opacity: 1; }
  .tooltip .t-url { color: rgba(100,200,255,0.7); font-size: 9px; margin-top: 3px; }
  .tooltip .t-clicks { color: rgba(120,240,180,0.8); font-size: 9px; }

  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 8;
    animation: particleFly 1.2s ease-out forwards;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.2); }
  }
</style>

<div id="universe">
  <canvas id="network"></canvas>

  <div id="hud">
    <div id="hud-title">Sentient Bookmarks</div>
    <div id="hud-status">NETWORK ACTIVE — <span id="node-count-display">0</span> nodes alive</div>
  </div>

  <div id="add-panel">
    <input id="url-input" type="text" placeholder="paste url or name…" />
    <button id="add-btn">+ SPAWN</button>
  </div>

  <div id="instructions">hover to awaken · click to visit · nodes grow with each visit</div>
</div>

<div class="tooltip" id="tooltip">
  <div id="t-name"></div>
  <div class="t-url" id="t-url"></div>
  <div class="t-clicks" id="t-clicks"></div>
</div>

<script>
const BOOKMARKS = [
  { name: 'GitHub', url: 'https://github.com', emoji: '🐙', color: '#c9d1d9', glow: '#58a6ff' },
  { name: 'YouTube', url: 'https://youtube.com', emoji: '▶', color: '#ff4444', glow: '#ff6b6b' },
  { name: 'Maps', url: 'https://maps.google.com', emoji: '◉', color: '#34d399', glow: '#6ee7b7' },
  { name: 'Figma', url: 'https://figma.com', emoji: '✦', color: '#a78bfa', glow: '#c4b5fd' },
  { name: 'Claude', url: 'https://claude.ai', emoji: '◈', color: '#f59e0b', glow: '#fbbf24' },
  { name: 'Reddit', url: 'https://reddit.com', emoji: '◎', color: '#f97316', glow: '#fb923c' },
  { name: 'Twitter', url: 'https://twitter.com', emoji: '✸', color: '#38bdf8', glow: '#7dd3fc' },
  { name: 'Notion', url: 'https://notion.so', emoji: '▣', color: '#d1d5db', glow: '#f9fafb' },
];

const universe = document.getElementById('universe');
const canvas = document.getElementById('network');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const nodeCountDisplay = document.getElementById('node-count-display');

let nodes = [];
let mouseX = 340, mouseY = 290;
let animFrame;
let time = 0;

function resize() {
  canvas.width = universe.offsetWidth;
  canvas.height = universe.offsetHeight;
}
resize();

function randRange(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }

function createNode(data, x, y, clicks = 0) {
  const el = document.createElement('div');
  el.className = 'bookmark-node';
  el.style.left = x + 'px';
  el.style.top = y + 'px';

  const baseSize = 28 + Math.min(clicks * 4, 28);

  el.innerHTML = `
    <div class="node-core" style="width:${baseSize}px;height:${baseSize}px;background:radial-gradient(circle at 35% 35%, ${data.glow}22, ${data.color}11);border:1px solid ${data.glow}55;box-shadow:0 0 ${10+clicks*3}px ${data.glow}44,inset 0 0 8px ${data.glow}22;">
      <div class="node-ring" style="width:${baseSize+12}px;height:${baseSize+12}px;border-color:${data.glow}44;animation-delay:${Math.random()*2}s;"></div>
      <div class="node-ring" style="width:${baseSize+24}px;height:${baseSize+24}px;border-color:${data.glow}22;animation-delay:${Math.random()*2+1}s;animation-duration:4s;"></div>
      <span class="node-icon" style="color:${data.glow};">${data.emoji}</span>
      <div class="node-count" style="background:${data.glow}33;border:0.5px solid ${data.glow}66;color:${data.glow};">${clicks}</div>
    </div>
    <div class="node-label" style="color:${data.glow};">${data.name}</div>
  `;

  const node = {
    data,
    el,
    x, y,
    vx: randRange(-0.3, 0.3),
    vy: randRange(-0.3, 0.3),
    phase: Math.random() * Math.PI * 2,
    speed: randRange(0.6, 1.4),
    clicks,
    baseSize,
    hovered: false,
    singing: false,
    singTimer: 0,
  };

  el.addEventListener('mouseenter', (e) => {
    node.hovered = true;
    node.singing = true;
    node.singTimer = 60;
    showTooltip(e, node);
    spawnMusicNotes(node);
  });

  el.addEventListener('mouseleave', () => {
    node.hovered = false;
    tooltip.classList.remove('show');
  });

  el.addEventListener('mousemove', (e) => {
    moveTooltip(e);
  });

  el.addEventListener('click', () => {
    node.clicks++;
    incrementNode(node);
    spawnRipple(node.x, node.y, node.data.glow);
    spawnParticles(node.x, node.y, node.data.glow);
    window.open(node.data.url, '_blank');
  });

  universe.appendChild(el);
  nodes.push(node);
  nodeCountDisplay.textContent = nodes.length;
  return node;
}

function incrementNode(node) {
  node.baseSize = 28 + Math.min(node.clicks * 4, 28);
  const core = node.el.querySelector('.node-core');
  const rings = node.el.querySelectorAll('.node-ring');
  const countEl = node.el.querySelector('.node-count');

  core.style.width = node.baseSize + 'px';
  core.style.height = node.baseSize + 'px';
  core.style.boxShadow = `0 0 ${10+node.clicks*3}px ${node.data.glow}55, inset 0 0 8px ${node.data.glow}33`;

  rings[0].style.width = (node.baseSize + 12) + 'px';
  rings[0].style.height = (node.baseSize + 12) + 'px';
  rings[1].style.width = (node.baseSize + 24) + 'px';
  rings[1].style.height = (node.baseSize + 24) + 'px';

  countEl.textContent = node.clicks;
  countEl.classList.add('visible');
  setTimeout(() => countEl.classList.remove('visible'), 2000);
}

function showTooltip(e, node) {
  document.getElementById('t-name').textContent = node.data.name;
  document.getElementById('t-url').textContent = node.data.url.replace('https://', '');
  document.getElementById('t-clicks').textContent = `visited ${node.clicks}× — vitality: ${'█'.repeat(Math.min(node.clicks, 8))}${'░'.repeat(Math.max(0, 8 - node.clicks))}`;
  tooltip.classList.add('show');
  moveTooltip(e);
}

function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

function spawnRipple(x, y, color) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.border = `1px solid ${color}`;
  r.style.boxShadow = `0 0 8px ${color}`;
  universe.appendChild(r);
  setTimeout(() => r.remove(), 800);
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 8) * Math.PI * 2;
    const dist = randRange(30, 70);
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.width = randRange(2, 5) + 'px';
    p.style.height = randRange(2, 5) + 'px';
    p.style.background = color;
    p.style.boxShadow = `0 0 4px ${color}`;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    universe.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

const noteChars = ['♩','♪','♫','♬','∿','~','·'];
function spawnMusicNotes(node) {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const note = document.createElement('div');
      note.textContent = noteChars[Math.floor(Math.random() * noteChars.length)];
      note.style.cssText = `
        position:absolute;
        left:${node.x + randRange(-20, 20)}px;
        top:${node.y - 10}px;
        color:${node.data.glow};
        font-size:${randRange(10, 16)}px;
        pointer-events:none;
        z-index:15;
        text-shadow:0 0 8px ${node.data.glow};
        animation: noteFloat 1.4s ease-out forwards;
      `;
      universe.appendChild(note);
      setTimeout(() => note.remove(), 1400);
    }, i * 180);
  }
}

const noteStyle = document.createElement('style');
noteStyle.textContent = `@keyframes noteFloat {
  0% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(calc(-50% + ${randRange(-30,30)}px), -60px) scale(0.5); }
}`;
document.head.appendChild(noteStyle);

function drawNetwork() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const W = canvas.width;
  const H = canvas.height;

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = 240;

      if (dist < maxDist) {
        const strength = 1 - dist / maxDist;
        const hovered = a.hovered || b.hovered;
        const alpha = hovered ? strength * 0.7 : strength * 0.18;
        const lineWidth = hovered ? strength * 1.5 : strength * 0.5;

        const midX = (a.x + b.x) / 2;
        const midY = (a.y + b.y) / 2 - 20 * strength;

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(midX, midY, b.x, b.y);

        const colorA = hovered ? (a.hovered ? a.data.glow : b.data.glow) : '#4af';
        const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        grad.addColorStop(0, hexAlpha(a.data.glow, alpha));
        grad.addColorStop(1, hexAlpha(b.data.glow, alpha));

        ctx.strokeStyle = grad;
        ctx.lineWidth = lineWidth;
        ctx.stroke();

        if (hovered && strength > 0.4) {
          const t = (time * 0.02) % 1;
          const px = bezierPoint(a.x, midX, b.x, t);
          const py = bezierPoint(a.y, midY, b.y, t);
          ctx.beginPath();
          ctx.arc(px, py, 2, 0, Math.PI * 2);
          ctx.fillStyle = hexAlpha(colorA, 0.9);
          ctx.fill();
        }
      }
    }
  }

  const mouseMaxDist = 160;
  nodes.forEach(node => {
    const dx = mouseX - node.x;
    const dy = mouseY - node.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < mouseMaxDist) {
      const alpha = (1 - dist/mouseMaxDist) * 0.12;
      ctx.beginPath();
      ctx.moveTo(node.x, node.y);
      ctx.lineTo(mouseX, mouseY);
      ctx.strokeStyle = hexAlpha(node.data.glow, alpha);
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  });
}

function bezierPoint(p0, p1, p2, t) {
  return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2;
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function updateNodes() {
  const W = universe.offsetWidth;
  const H = universe.offsetHeight;
  const margin = 60;

  nodes.forEach(node => {
    const bobX = Math.sin(time * 0.008 * node.speed + node.phase) * 1.2;
    const bobY = Math.cos(time * 0.006 * node.speed + node.phase * 1.3) * 1.0;

    if (!node.hovered) {
      node.x += node.vx + bobX * 0.3;
      node.y += node.vy + bobY * 0.3;

      node.vx *= 0.98;
      node.vy *= 0.98;

      if (node.x < margin) { node.vx += 0.08; }
      if (node.x > W - margin) { node.vx -= 0.08; }
      if (node.y < margin) { node.vy += 0.08; }
      if (node.y > H - margin) { node.vy -= 0.08; }

      node.x = Math.max(margin, Math.min(W - margin, node.x));
      node.y = Math.max(margin, Math.min(H - margin, node.y));
    }

    nodes.forEach(other => {
      if (other === node) return;
      const dx = node.x - other.x;
      const dy = node.y - other.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const minDist = 80;
      if (dist < minDist && dist > 0) {
        const force = (minDist - dist) / minDist * 0.05;
        node.vx += (dx/dist) * force;
        node.vy += (dy/dist) * force;
      }
    });

    const pulseMult = node.hovered ? 1.1 : 1 + Math.sin(time * 0.05 * node.speed + node.phase) * 0.04;
    const glowIntensity = node.hovered ? 20 + node.clicks * 4 : 8 + node.clicks * 2;
    const core = node.el.querySelector('.node-core');
    if (core && !node.hovered) {
      core.style.boxShadow = `0 0 ${glowIntensity}px ${node.data.glow}${node.clicks > 0 ? '66' : '33'}, inset 0 0 8px ${node.data.glow}22`;
    }

    node.el.style.left = node.x + 'px';
    node.el.style.top = node.y + 'px';

    if (node.singTimer > 0) {
      node.singTimer--;
      if (node.singTimer <= 0) node.singing = false;
    }
  });
}

function loop() {
  time++;
  updateNodes();
  drawNetwork();
  animFrame = requestAnimationFrame(loop);
}

universe.addEventListener('mousemove', (e) => {
  const rect = universe.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

universe.addEventListener('mouseleave', () => {
  mouseX = -1000;
  mouseY = -1000;
});

const W = () => universe.offsetWidth;
const H = () => universe.offsetHeight;

function placeNode(i, total) {
  const cols = Math.ceil(Math.sqrt(total));
  const rows = Math.ceil(total / cols);
  const col = i % cols;
  const row = Math.floor(i / cols);
  const marginX = 80, marginY = 80;
  const spacingX = (W() - marginX * 2) / Math.max(cols - 1, 1);
  const spacingY = (H() - marginY * 2) / Math.max(rows - 1, 1);
  return {
    x: marginX + col * spacingX + randRange(-30, 30),
    y: marginY + row * spacingY + randRange(-25, 25),
  };
}

BOOKMARKS.forEach((bm, i) => {
  const pos = placeNode(i, BOOKMARKS.length);
  createNode(bm, pos.x, pos.y);
});

document.getElementById('add-btn').addEventListener('click', () => {
  const raw = document.getElementById('url-input').value.trim();
  if (!raw) return;

  let url = raw;
  let name = raw;
  if (!raw.startsWith('http')) {
    url = 'https://' + raw;
    name = raw.replace(/^www\./,'').split('.')[0];
  } else {
    name = raw.replace('https://','').replace('http://','').replace(/^www\./,'').split('/')[0].split('.')[0];
  }
  name = name.charAt(0).toUpperCase() + name.slice(1);

  const colors = [
    { color: '#818cf8', glow: '#a5b4fc' },
    { color: '#34d399', glow: '#6ee7b7' },
    { color: '#fb7185', glow: '#fda4af' },
    { color: '#fbbf24', glow: '#fcd34d' },
    { color: '#38bdf8', glow: '#7dd3fc' },
  ];
  const emojis = ['◉','✦','◈','✸','▣','◎','∴','⊕'];
  const c = colors[nodes.length % colors.length];
  const e = emojis[nodes.length % emojis.length];

  const margin = 80;
  const x = randRange(margin, W() - margin);
  const y = randRange(margin, H() - margin);

  const bm = { name, url, emoji: e, color: c.color, glow: c.glow };
  const node = createNode(bm, x, y);
  spawnRipple(x, y, c.glow);
  document.getElementById('url-input').value = '';
});

document.getElementById('url-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('add-btn').click();
});

window.addEventListener('resize', resize);

loop();
</script>
